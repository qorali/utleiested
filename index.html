<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Leieting</title>
  <style>
    body { font-family: sans-serif; max-width: 800px;
           margin: 0 auto; padding: 20px; }
    h1 { color: #2c7a4b; }
    .annonse { border: 1px solid #ddd; border-radius: 8px;
               padding: 16px; margin: 16px 0; }
    .pris { font-weight: bold; color: #2c7a4b; }
  </style>
</head>
<body>

  <h1>Leieting</h1>
  <p>Lei og lån ting av folk nær deg</p>

  <div class="annonse">
    <h2>Sykkel — trekkhjul</h2>
    <p>Perfekt for turer. Hentes i Mandal sentrum.</p>
    <p class="pris">150 kr per dag</p>
  </div>

  <div class="annonse">
    <h2>Drill med bits</h2>
    <p>Bosch-drill med komplett bits-sett.</p>
    <p class="pris">100 kr per dag</p>
  </div>

</body>
</html>
